version: '3.8'

services:
    db:
      image: mcr.microsoft.com/mssql/server:2022-latest
      container_name: mssql_confitec_prod
      restart: always
      environment:
        ACCEPT_EULA: "Y"
        MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
      ports:
        - "${DB_PORT}"
      volumes:
        - mssql_seguros_data:/var/opt/mssql

volumes:
  mssql_seguros_data: