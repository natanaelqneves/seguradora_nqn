version: '3.8'

services:
    db:
      image: mcr.microsoft.com/mssql/server:2022-latest
      container_name: mssql_prod
      restart: always
      environment:
        ACCEPT_EULA: "Y"
        MSSQL_SA_PASSWORD: "${DB_PASSWORD:123456}"
      ports:
        - "1433"
      volumes:
        - mssql_seguros_data:/var/opt/mssql

volumes:
  mssql_seguros_data: